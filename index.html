<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>This is my project — Products CRUD</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="banner">
    <h1 class="banner-title">This is my project</h1>
    <p class="banner-subtitle">A simple single-page CRUD built with PHP, JS &amp; MySQL</p>
  </header>

  <main class="container">

    <section class="card">
      <h2 id="form-title">Add Product</h2>
      <form id="product-form" autocomplete="off">
        <input type="hidden" id="product-id" />

        <div class="field">
          <label for="name">Name</label>
          <input type="text" id="name" required maxlength="150" />
        </div>

        <div class="field">
          <label for="price">Price</label>
          <input type="number" id="price" step="0.01" min="0" required />
        </div>

        <div class="field">
          <label for="description">Description</label>
          <textarea id="description" rows="3" maxlength="1000"></textarea>
        </div>

        <div class="form-actions">
          <button type="submit" id="submit-btn" class="btn btn-primary">Save</button>
          <button type="button" id="cancel-btn" class="btn btn-ghost hidden">Cancel</button>
        </div>
      </form>
      <p id="form-message" class="message"></p>
    </section>

    <section class="card">
      <div class="card-header">
        <h2>Products</h2>
        <button type="button" id="refresh-btn" class="btn btn-ghost">Refresh</button>
      </div>

      <div class="table-wrapper">
        <table id="products-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Price</th>
              <th>Description</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="products-tbody">
            <tr><td colspan="5" class="empty">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <script src="js/app.js"></script>
</body>
</html>
